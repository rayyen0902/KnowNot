<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <title>FE-NIGHT-10 notify section capture</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 390px; padding: 24px 20px; background: linear-gradient(180deg, #fff 0%, #fbf9f9 100%); min-height: 400px; font-family: 'PingFang SC', sans-serif; }
    .settings-section { display: flex; flex-direction: column; gap: 16px; }
    .settings-section__title-wrap { padding: 0 8px; }
    .settings-section__title { color: #8e4864; font-size: 18px; line-height: 1.5555556; font-weight: 500; }
    .settings-group--notify { padding: 16px; display: flex; flex-direction: column; gap: 24px; border-radius: 24px; background: #f5f3f3; overflow: hidden; }
    .notify-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .notify-row__body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .notify-row__title { color: #1b1c1c; font-size: 16px; line-height: 1.5; font-weight: 500; }
    .notify-row__desc { color: #524347; font-size: 12px; line-height: 1.3333333; font-weight: 500; }
    .notify-switch { position: relative; width: 44px; height: 24px; border-radius: 9999px; background: #e4e2e2; flex-shrink: 0; }
    .notify-switch--active { background: #8e4864; }
    .notify-switch__thumb { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 9999px; background: #fff; border: 1px solid #d1d5db; }
    .notify-switch--active .notify-switch__thumb { left: 22px; border-color: #fff; }
  </style>
</head>
<body>
  <div class="settings-section">
    <div class="settings-section__title-wrap"><div class="settings-section__title">通知设置</div></div>
    <div class="settings-group settings-group--notify">
      <div class="notify-row"><div class="notify-row__body"><div class="notify-row__title">护肤提醒</div><div class="notify-row__desc">每日早晚护肤步骤定时提醒</div></div><div class="notify-switch notify-switch--active"><div class="notify-switch__thumb"></div></div></div>
      <div class="notify-row"><div class="notify-row__body"><div class="notify-row__title">皮肤分析报告</div><div class="notify-row__desc">每周AI皮肤状态变化推送</div></div><div class="notify-switch notify-switch--active"><div class="notify-switch__thumb"></div></div></div>
      <div class="notify-row"><div class="notify-row__body"><div class="notify-row__title">系统通知</div><div class="notify-row__desc">应用更新与重要公告</div></div><div class="notify-switch"><div class="notify-switch__thumb"></div></div></div>
    </div>
  </div>
</body>
</html>
