<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <title>camera-capture preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 390px; height: 844px; font-family: 'PingFang SC', sans-serif; }
    .camera-capture-page {
      height: 844px;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    .camera-capture-page__camera {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.4;
      background: radial-gradient(ellipse at 50% 30%, #3a2a32 0%, #1a1014 50%, #0d0a0c 100%);
    }
    .camera-capture-page__viewport-wrap {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 50%;
      transform: translateY(-60%);
    }
    .camera-capture-page__viewport {
      height: 466.66px;
      border-radius: 32px;
      background: #e4e2e2;
      box-shadow: 0 8px 28px rgba(142, 72, 100, 0.05);
      position: relative;
      overflow: hidden;
    }
    .camera-capture-page__frost {
      position: absolute;
      left: 24px;
      top: 24px;
      width: 302px;
      height: 418.66px;
      border-radius: 24px;
      border: 1px solid rgba(247, 161, 192, 0.16);
      background: rgba(251, 249, 249, 0.01);
      backdrop-filter: blur(1.75px);
      overflow: hidden;
    }
    .camera-capture-page__corner {
      position: absolute;
      width: 40px;
      height: 40px;
      opacity: 0.8;
    }
    .camera-capture-page__corner--tl {
      top: 1px;
      left: 1px;
      border-left: 4px solid #8e4864;
      border-top: 4px solid #8e4864;
      border-top-left-radius: 24px;
    }
    .camera-capture-page__corner--tr {
      top: 1px;
      right: 1px;
      border-right: 4px solid #8e4864;
      border-top: 4px solid #8e4864;
      border-top-right-radius: 24px;
    }
    .camera-capture-page__corner--bl {
      bottom: 1px;
      left: 1px;
      border-left: 4px solid #8e4864;
      border-bottom: 4px solid #8e4864;
      border-bottom-left-radius: 24px;
    }
    .camera-capture-page__corner--br {
      bottom: 1px;
      right: 1px;
      border-right: 4px solid #8e4864;
      border-bottom: 4px solid #8e4864;
      border-bottom-right-radius: 24px;
    }
    .camera-capture-page__laser {
      position: absolute;
      left: 1px;
      top: 209.33px;
      width: 300px;
      height: 2px;
      background: linear-gradient(90deg, rgba(142, 72, 100, 0) 0%, #8e4864 50%, rgba(142, 72, 100, 0) 100%);
      box-shadow: 0 0 10.5px rgba(142, 72, 100, 0.8);
    }
    .camera-capture-page__center {
      position: absolute;
      inset: 0;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .camera-capture-page__center-icon {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: 1px solid #efeded;
      background: rgba(251, 249, 249, 0.64);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      color: #8e4864;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .camera-capture-page__center-text {
      color: #8e4864;
      font-size: 18px;
      line-height: 1.5555556;
      letter-spacing: 0.45px;
      text-align: center;
    }
    .camera-capture-page__toolbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      padding-bottom: 28px;
      background: rgba(251, 249, 249, 0.49);
      box-shadow: 0 -8px 28px rgba(27, 28, 28, 0.05);
      backdrop-filter: blur(17.5px);
    }
    .camera-capture-page__capture-btn {
      width: 100%;
      border-radius: 999px;
      background: #8e4864;
      box-shadow: 0 8px 21px rgba(142, 72, 100, 0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 0;
      font-size: 18px;
      line-height: 1.5555556;
      text-align: center;
    }
    .camera-capture-page__capture-icon { font-size: 18px; line-height: 1; }
    .camera-capture-page__hint {
      color: #524347;
      opacity: 0.7;
      font-size: 12px;
      line-height: 1.3333333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="camera-capture-page">
    <div class="camera-capture-page__camera" aria-hidden="true"></div>
    <div class="camera-capture-page__viewport-wrap">
      <div class="camera-capture-page__viewport">
        <div class="camera-capture-page__frost">
          <div class="camera-capture-page__corner camera-capture-page__corner--tl"></div>
          <div class="camera-capture-page__corner camera-capture-page__corner--tr"></div>
          <div class="camera-capture-page__corner camera-capture-page__corner--bl"></div>
          <div class="camera-capture-page__corner camera-capture-page__corner--br"></div>
          <div class="camera-capture-page__laser"></div>
          <div class="camera-capture-page__center">
            <div class="camera-capture-page__center-icon">◍</div>
            <div class="camera-capture-page__center-text">将瓶身或成分表置于框内</div>
          </div>
        </div>
      </div>
    </div>
    <div class="camera-capture-page__toolbar">
      <div class="camera-capture-page__capture-btn">
        <span class="camera-capture-page__capture-icon">▣</span>
        <span>开始拍摄分析</span>
      </div>
      <div class="camera-capture-page__hint">您的照片仅用于本次分析，我们将严格保护您的隐私</div>
    </div>
  </div>
</body>
</html>
