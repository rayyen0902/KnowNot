<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>【交付专用】个人中心</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-surface": "#1b1c1c",
                        "on-secondary-fixed": "#00201f",
                        "on-surface-variant": "#524347",
                        "surface-bright": "#fbf9f9",
                        "on-tertiary-container": "#3c4485",
                        "tertiary-container": "#adb5fe",
                        "secondary-container": "#9aeeeb",
                        "surface-variant": "#e4e2e2",
                        "surface-container": "#efeded",
                        "primary-fixed": "#ffd9e4",
                        "on-tertiary-fixed": "#091255",
                        "on-primary-container": "#76344f",
                        "secondary-fixed": "#9df1ee",
                        "outline-variant": "#d6c1c6",
                        "surface-container-low": "#f5f3f3",
                        "inverse-on-surface": "#f2f0f0",
                        "secondary": "#006a68",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e4e2e2",
                        "on-background": "#1b1c1c",
                        "outline": "#847377",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#3b0420",
                        "inverse-primary": "#ffb0cc",
                        "on-secondary-container": "#006e6c",
                        "surface-dim": "#dbdada",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e9e8e8",
                        "secondary-fixed-dim": "#81d5d1",
                        "primary-fixed-dim": "#ffb0cc",
                        "on-secondary-fixed-variant": "#00504e",
                        "tertiary-fixed-dim": "#bcc2ff",
                        "inverse-surface": "#303031",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary": "#8e4864",
                        "tertiary": "#51599b",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#f7a1c0",
                        "on-tertiary-fixed-variant": "#394182",
                        "surface": "#fbf9f9",
                        "background": "#fbf9f9",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#dfe0ff",
                        "surface-tint": "#8e4864",
                        "on-primary-fixed-variant": "#71314c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-12 relative">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 pt-12 pb-4 bg-transparent absolute top-0 left-0 z-50">
<button aria-label="Go back" class="p-2 -ml-2 text-[#8e4864] hover:bg-[#f7a1c0]/10 transition-colors rounded-full flex items-center justify-center active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#8e4864]">【交付专用】个人中心</h1>
<button aria-label="Settings" class="p-2 -mr-2 text-slate-500 hover:bg-[#f7a1c0]/10 transition-colors rounded-full flex items-center justify-center active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="px-4 max-w-lg mx-auto space-y-6 pt-28">
<!-- Top Section: User Profile -->
<section class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low shadow-sm">
<div class="relative w-16 h-16 rounded-full overflow-hidden bg-surface-variant flex-shrink-0">
<img alt="Jane Doe Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a young woman with clear glowing skin, natural lighting, soft background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBq8Jv6rupLKS6SOfTtBibc5bl5HwkTa4_-8jrX8PvJeutJH7GmzHBtp0TC9_hRGkwl8K7Fkli34CMqiDuSP-ED7PtJ3P-gzxsGtbfve654tnEYdDwRqWf4LWnXL-7yBHjqtk_Z9cEUSxRxA88ob8YM3zOGhcFeS9O5KYwt3piNuBSxIyHizzSrCeX_cjo95adzWzU1bsGf4b7BcH8k5cUX6BJthf8qodb-4cAMyfIi3w9Qt8qfFBIRsN_gzOMANfC-eQ-3U8cw-Qs"/>
</div>
<div class="flex-col flex-1">
<h2 class="font-headline font-semibold text-[1.125rem] text-on-surface">Jane Doe</h2>
<p class="text-[0.875rem] text-on-surface-variant mb-2">护肤达人</p>
<button class="text-xs font-medium text-primary hover:text-on-primary hover:bg-primary px-3 py-1.5 rounded-full border border-primary transition-colors inline-block">
                    编辑/完善资料
                </button>
</div>
</section>
<!-- Hero Section: My Skincare Products -->
<section class="rounded-xl overflow-hidden relative shadow-sm" style="background: linear-gradient(135deg, #8e4864 0%, #f7a1c0 100%);">
<div class="p-6 relative z-10 text-on-primary">
<div class="flex justify-between items-start mb-4">
<h3 class="font-headline font-bold text-[1.75rem] leading-tight">我的护肤品</h3>
<span class="material-symbols-outlined text-4xl opacity-80" data-icon="spa" data-weight="fill" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<p class="text-[0.875rem] mb-6 opacity-90 max-w-[80%] leading-relaxed">
                    登记您的产品，AI为您智能排班，避免成分冲突。
                </p>
<button class="bg-surface-bright text-primary font-semibold text-sm px-5 py-2.5 rounded-full shadow-sm hover:shadow-md transition-all active:scale-95">
                    立即录入
                </button>
</div>
<!-- Decorative glass element -->
<div class="absolute -bottom-8 -right-8 w-40 h-40 bg-surface-bright opacity-10 rounded-full blur-2xl pointer-events-none"></div>
</section>
<!-- Functional Group: My Orders -->
<section class="bg-surface-container-low rounded-xl p-5 shadow-sm">
<div class="flex justify-between items-center mb-5">
<h3 class="font-headline font-semibold text-[1.125rem] text-on-surface">我的订单</h3>
<button class="text-[0.875rem] text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    全部订单 <span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<div class="flex justify-between items-center px-2">
<button class="flex flex-col items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group">
<div class="relative w-12 h-12 flex items-center justify-center bg-surface rounded-full shadow-sm group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="absolute -top-1 -right-1 bg-error text-on-error text-[0.625rem] font-bold px-1.5 py-0.5 rounded-full border border-surface-container-low">1</span>
</div>
<span class="text-[0.6875rem] font-medium">待付款</span>
</button>
<button class="flex flex-col items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group">
<div class="w-12 h-12 flex items-center justify-center bg-surface rounded-full shadow-sm group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
</div>
<span class="text-[0.6875rem] font-medium">待收货</span>
</button>
<button class="flex flex-col items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group">
<div class="w-12 h-12 flex items-center justify-center bg-surface rounded-full shadow-sm group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="rate_review">rate_review</span>
</div>
<span class="text-[0.6875rem] font-medium">待评价</span>
</button>
<button class="flex flex-col items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group">
<div class="w-12 h-12 flex items-center justify-center bg-surface rounded-full shadow-sm group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="currency_exchange">currency_exchange</span>
</div>
<span class="text-[0.6875rem] font-medium">退换/售后</span>
</button>
</div>
</section>
<!-- Functional Group: Trends -->
<section class="bg-surface-container-low rounded-xl p-5 shadow-sm">
<div class="flex justify-between items-center mb-4">
<h3 class="font-headline font-semibold text-[1.125rem] text-on-surface">肤质变化曲线</h3>
<span class="text-[0.75rem] text-primary bg-primary-fixed px-2 py-1 rounded-full font-medium">+15% 改善</span>
</div>
<div class="w-full h-24 relative pt-4">
<svg class="w-full h-full absolute bottom-0 left-0 overflow-visible" preserveaspectratio="none" viewbox="0 0 100 40">
<defs>
<lineargradient id="trend-gradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#8e4864" stop-opacity="0.3"></stop>
<stop offset="100%" stop-color="#8e4864" stop-opacity="0"></stop>
</lineargradient>
</defs>
<path d="M0,35 Q15,30 25,32 T45,25 T65,20 T85,10 T100,5 L100,40 L0,40 Z" fill="url(#trend-gradient)"></path>
<path d="M0,35 Q15,30 25,32 T45,25 T65,20 T85,10 T100,5" fill="none" stroke="#8e4864" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<circle cx="0" cy="35" fill="#8e4864" r="2"></circle>
<circle cx="25" cy="32" fill="#8e4864" r="2"></circle>
<circle cx="45" cy="25" fill="#8e4864" r="2"></circle>
<circle cx="65" cy="20" fill="#8e4864" r="2"></circle>
<circle cx="85" cy="10" fill="#8e4864" r="2"></circle>
<circle cx="100" cy="5" fill="#8e4864" r="2"></circle>
</svg>
</div>
<div class="flex justify-between mt-3 text-[0.625rem] text-on-surface-variant font-medium">
<span>一</span>
<span>二</span>
<span>三</span>
<span>四</span>
<span>五</span>
<span>六</span>
<span class="text-primary font-bold">今</span>
</div>
</section>
<!-- Functional Group: Lists -->
<section class="bg-surface-container-low rounded-xl overflow-hidden shadow-sm">
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors border-b border-outline-variant/15">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-sm" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="text-[0.875rem] font-medium text-on-surface">我的收藏</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors border-b border-outline-variant/15">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-secondary-fixed text-on-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-sm" data-icon="monitor_heart">monitor_heart</span>
</div>
<span class="text-[0.875rem] font-medium text-on-surface">肤质记录</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-sm" data-icon="settings">settings</span>
</div>
<span class="text-[0.875rem] font-medium text-on-surface">设置</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
</section>
</main>
</body></html>
